# SHACKLE CI
# Runs the real test suite for THIS repo layout (shackle/ + tests/ + fixtures/).
# Previous pipeline targeted a non-existent v2/ monorepo tree and always failed.

name: SHACKLE CI

on:
  push:
    branches: [master, v2, "feat/**", "fix/**"]
    paths-ignore:
      - "**.md"
      - "index.html"
  pull_request:
    branches: [master]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest rich
          pip install -e . || echo "no installable package metadata; running against source tree"
      - name: Run conformance + core tests
        run: |
          set +e
          python -m pytest tests/ -rA --tb=long > pytest_full.txt 2>&1
          code=$?
          echo "EXIT_CODE=$code" >> pytest_full.txt
          exit 0
      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ matrix.python-version }}
          path: pytest_full.txt
      - name: Fail if tests failed
        run: |
          grep -q "EXIT_CODE=0" pytest_full.txt || (echo "tests failed"; tail -5 pytest_full.txt; exit 1)
      - name: Standalone conformance harness (informational)
        # pytest above already runs these vectors; this is a redundant direct
        # invocation for humans. Run from repo root so 'import shackle' resolves,
        # and never fail the build on it.
        continue-on-error: true
        run: |
          PYTHONPATH=. python tests/test_conformance.py

  daemon-tests:
    name: V2 daemon (atomic state + fallback)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install v2 daemon dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r v2/daemon/requirements.txt
          pip install pytest
      - name: Run atomic state tests (real Redis)
        working-directory: v2/daemon
        run: |
          python -m pytest test_state_atomic.py -v --tb=short
      - name: Run daemon<->decide() wiring proof (gating)
        # Proves the daemon routes verdicts through the verified decide().
        # Runs from repo root so 'import shackle' resolves; PYTHONPATH includes
        # v2/daemon so 'import decision' resolves. This is a GATING check.
        run: |
          PYTHONPATH=.:v2/daemon python -m pytest v2/tests/test_daemon_decide_wiring.py -v --tb=long
      - name: Run daemon fallback test (no daemon required, informational)
        working-directory: v2/daemon
        # Only the fallback path is daemon-independent; full integration tests in
        # test_daemon.py require a running daemon + Postgres and are run via
        # docker-compose, not CI. Kept non-blocking so the atomic-state proof
        # above is the gating check.
        continue-on-error: true
        run: |
          python -m pytest test_daemon.py -v --tb=short -k fallback

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check latest commit for secret-like files
        run: |
          if git log -1 --name-only --pretty=format: | grep -qiE '(\.env$|secret|credential|password|_token|api[_-]?key)'; then
            echo "::warning::Potential secret-like filename in commit â review before publishing."
          else
            echo "No secret-like filenames in latest commit."
          fi
