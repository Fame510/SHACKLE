# SHACKLE CI
# Runs the real test suite for THIS repo layout (shackle/ + tests/ + fixtures/).
# Previous pipeline targeted a non-existent v2/ monorepo tree and always failed.

name: SHACKLE CI

on:
  push:
    branches: [master, v2, "feat/**", "fix/**"]
    paths-ignore:
      - "**.md"
      - "index.html"
  pull_request:
    branches: [master]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest rich
          # install package if it declares metadata; ignore if none
          pip install -e . || echo "no installable package metadata; running against source tree"
      - name: Run conformance + core tests
        run: |
          python -m pytest tests/ -v --tb=short
      - name: Standalone conformance harness (no pytest)
        run: |
          python tests/test_conformance.py

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check latest commit for secret-like files
        run: |
          if git log -1 --name-only --pretty=format: | grep -qiE '(\.env$|secret|credential|password|_token|api[_-]?key)'; then
            echo "::warning::Potential secret-like filename in commit — review before publishing."
          else
            echo "No secret-like filenames in latest commit."
          fi
